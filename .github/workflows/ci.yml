name: CI — 04 HR Scout

on:
  push:
    branches: [main]
    paths: ['proyectos/04-hr-scout/**']
  pull_request:
    branches: [main]
    paths: ['proyectos/04-hr-scout/**']

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: proyectos/04-hr-scout

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: proyectos/04-hr-scout/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
