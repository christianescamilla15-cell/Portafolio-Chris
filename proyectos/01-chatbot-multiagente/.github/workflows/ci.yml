name: CI — 01 Chatbot Multiagente

on:
  push:
    branches: [main]
    paths: ['proyectos/01-chatbot-multiagente/**']
  pull_request:
    branches: [main]
    paths: ['proyectos/01-chatbot-multiagente/**']

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: proyectos/01-chatbot-multiagente

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: proyectos/01-chatbot-multiagente/package-lock.json

      - run: npm ci
      - run: npm run lint 2>/dev/null || true
      - run: npm test
      - run: npm run build
