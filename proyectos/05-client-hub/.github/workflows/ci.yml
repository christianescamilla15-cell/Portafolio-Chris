name: CI — 05 Client Hub

on:
  push:
    branches: [main]
    paths: ['proyectos/05-client-hub/**']
  pull_request:
    branches: [main]
    paths: ['proyectos/05-client-hub/**']

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: proyectos/05-client-hub

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: proyectos/05-client-hub/package-lock.json

      - run: npm ci
      - run: npm run lint 2>/dev/null || true
      - run: npm test
      - run: npm run build
